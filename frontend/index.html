<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZLMediaKit 管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        accent: '#ec4899',
                        dark: '#1e293b',
                        light: '#f8fafc',
                    },
                    fontFamily: {
                        inter: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'neon': '0 0 15px rgba(99, 102, 241, 0.5)',
                        'neon-lg': '0 0 25px rgba(99, 102, 241, 0.6)',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .bg-gradient-primary {
                background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            }
            .bg-gradient-secondary {
                background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            }
            .bg-gradient-accent {
                background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);
            }
            .bg-gradient-card {
                background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            }
            .text-gradient {
                background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            .animate-float {
                animation: float 6s ease-in-out infinite;
            }
            .animate-pulse-slow {
                animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            }
            .animate-glow {
                animation: glow 2s ease-in-out infinite alternate;
            }
            @keyframes float {
                0%, 100% { transform: translateY(0px); }
                50% { transform: translateY(-10px); }
            }
            @keyframes glow {
                from {
                    box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
                }
                to {
                    box-shadow: 0 0 20px rgba(99, 102, 241, 0.8);
                }
            }
        }
    </style>
</head>
<body class="font-inter min-h-screen bg-gradient-secondary relative overflow-hidden">
    <!-- 背景装饰 -->
    <div class="absolute inset-0 z-0">
        <div class="absolute top-20 left-1/4 w-96 h-96 bg-primary/20 rounded-full blur-3xl"></div>
        <div class="absolute bottom-20 right-1/4 w-80 h-80 bg-secondary/20 rounded-full blur-3xl"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-accent/10 rounded-full blur-3xl"></div>
    </div>

    <div class="flex h-screen">
        <!-- 左侧菜单 -->
        <div class="w-64 bg-white/10 backdrop-blur-xl shadow-lg z-30 border-r border-white/20">
            <!-- 头部 -->
            <div class="bg-gradient-primary h-16 flex items-center justify-center relative overflow-hidden">
                <div class="absolute inset-0 animate-glow"></div>
                <h1 class="text-white text-2xl font-bold z-10 flex items-center gap-2">
                    <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center">
                        <i class="fa fa-play-circle text-white"></i>
                    </div>
                    <span>ZLMediaKit</span>
                </h1>
            </div>
            
            <!-- 菜单列表 -->
            <nav class="py-4">
                <ul>
                    <li>
                        <a href="#" data-page="dashboard" class="flex items-center px-6 py-4 text-white font-semibold text-lg border-l-4 border-primary bg-white/5 hover:bg-white/10 transition-all duration-300 hover:translate-x-2">
                            <i class="fa fa-dashboard text-xl mr-4"></i>
                            <span>状态概览</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-page="network" class="flex items-center px-6 py-4 text-white/80 font-semibold text-lg border-l-4 border-transparent hover:bg-white/10 transition-all duration-300 hover:translate-x-2">
                            <i class="fa fa-link text-xl mr-4"></i>
                            <span>连接管理</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-page="streams" class="flex items-center px-6 py-4 text-white/80 font-semibold text-lg border-l-4 border-transparent hover:bg-white/10 transition-all duration-300 hover:translate-x-2">
                            <i class="fa fa-video-camera text-xl mr-4"></i>
                            <span>视频管理</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-page="pull-proxy" class="flex items-center px-6 py-4 text-white/80 font-semibold text-lg border-l-4 border-transparent hover:bg-white/10 transition-all duration-300 hover:translate-x-2">
                            <i class="fa fa-cloud-download text-xl mr-4"></i>
                            <span>拉流代理</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-page="push-proxy" class="flex items-center px-6 py-4 text-white/80 font-semibold text-lg border-l-4 border-transparent hover:bg-white/10 transition-all duration-300 hover:translate-x-2">
                            <i class="fa fa-upload text-xl mr-4"></i>
                            <span>推流代理</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-page="auth" class="flex items-center px-6 py-4 text-white/80 font-semibold text-lg border-l-4 border-transparent hover:bg-white/10 transition-all duration-300 hover:translate-x-2">
                            <i class="fa fa-lock text-xl mr-4"></i>
                            <span>鉴权管理</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-page="settings" class="flex items-center px-6 py-4 text-white/80 font-semibold text-lg border-l-4 border-transparent hover:bg-white/10 transition-all duration-300 hover:translate-x-2">
                            <i class="fa fa-cog text-xl mr-4"></i>
                            <span>服务配置</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-page="protocol-options" class="flex items-center px-6 py-4 text-white/80 font-semibold text-lg border-l-4 border-transparent hover:bg-white/10 transition-all duration-300 hover:translate-x-2">
                            <i class="fa fa-cogs text-xl mr-4"></i>
                            <span>协议配置</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-page="plugins" class="flex items-center px-6 py-4 text-white/80 font-semibold text-lg border-l-4 border-transparent hover:bg-white/10 transition-all duration-300 hover:translate-x-2">
                            <i class="fa fa-puzzle-piece text-xl mr-4"></i>
                            <span>插件管理</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-page="whip" class="flex items-center px-6 py-4 text-white/80 font-semibold text-lg border-l-4 border-transparent hover:bg-white/10 transition-all duration-300 hover:translate-x-2">
                            <i class="fa fa-podcast text-xl mr-4"></i>
                            <span>在线推流</span>
                        </a>
                    </li>
                    <li class="mt-8">
                        <a href="javascript:;" id="logoutBtn" class="flex items-center px-6 py-4 text-rose-400 font-semibold text-lg border-l-4 border-transparent hover:bg-rose-400/10 transition-all duration-300 hover:translate-x-2">
                            <i class="fa fa-sign-out text-xl mr-4"></i>
                            <span>退出登录</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
        
        <!-- 内容区域 -->
        <div class="flex-1 overflow-hidden flex flex-col relative" id="contentArea">
            <!-- 标签页栏 -->
            <div class="bg-white/5 border-b border-white/10 px-4 py-2 flex items-center relative" style="z-index: 25;" id="tabBar">
                <div class="flex items-center space-x-2 overflow-x-auto" id="tabs">
                    <!-- 标签页将动态添加 -->
                </div>
            </div>
            
            <!-- 页面内容区域 -->
            <div class="flex-1 relative overflow-hidden" id="pageContent">
                <!-- 概览页面 -->
                <div class="page absolute inset-0 flex flex-col" id="dashboard-page">
                    <div class="flex-1 overflow-y-auto p-6">
                        <div id="dashboard-content">
                            <!-- 内容将通过AJAX加载 -->
                        </div>
                    </div>
                </div>
                
                <!-- 流管理页面 -->
                <div class="page absolute inset-0 flex flex-col hidden" id="streams-page">
                    <div class="flex-1 overflow-y-auto p-6">
                        <div id="streams-content">
                            <!-- 内容将通过AJAX加载 -->
                        </div>
                    </div>
                    <div id="streams-modal-container" class="absolute inset-0 pointer-events-none" style="z-index: 20;"></div>
                </div>
                
                <!-- 拉流代理页面 -->
                <div class="page absolute inset-0 flex flex-col hidden" id="pull-proxy-page">
                    <div class="flex-1 overflow-y-auto p-6">
                        <div id="pull-proxy-content">
                            <!-- 内容将通过AJAX加载 -->
                        </div>
                    </div>
                    <div id="pull-proxy-modal-container" class="absolute inset-0 pointer-events-none" style="z-index: 20;"></div>
                </div>
                
                <!-- 推流代理页面 -->
                <div class="page absolute inset-0 flex flex-col hidden" id="push-proxy-page">
                    <div class="flex-1 overflow-y-auto p-6">
                        <div id="push-proxy-content">
                            <!-- 内容将通过AJAX加载 -->
                        </div>
                    </div>
                </div>
                
                <!-- 鉴权管理页面 -->
                <div class="page absolute inset-0 flex flex-col hidden" id="auth-page">
                    <div class="flex-1 overflow-y-auto p-6">
                        <div id="auth-content">
                            <!-- 内容将通过AJAX加载 -->
                        </div>
                    </div>
                </div>
                
                <!-- 服务配置页面 -->
                <div class="page absolute inset-0 flex flex-col hidden" id="settings-page">
                    <div class="flex-1 overflow-y-auto p-6">
                        <div id="settings-content">
                            <!-- 内容将通过AJAX加载 -->
                        </div>
                    </div>
                </div>
                
                <!-- 在线推流页面 -->
                <div class="page absolute inset-0 flex flex-col hidden" id="whip-page">
                    <div class="flex-1 overflow-y-auto p-6">
                        <div id="whip-content">
                            <!-- 内容将通过AJAX加载 -->
                        </div>
                    </div>
                </div>
                
                <!-- 网络链接页面 -->
                <div class="page absolute inset-0 flex flex-col hidden" id="network-page">
                    <div class="flex-1 overflow-y-auto p-6">
                        <div id="network-content">
                            <!-- 内容将通过AJAX加载 -->
                        </div>
                    </div>
                </div>
                
                <!-- 协议配置页面 -->
                <div class="page absolute inset-0 flex flex-col hidden" id="protocol-options-page">
                    <div class="flex-1 overflow-y-auto p-6">
                        <div id="protocol-options-content">
                            <!-- 内容将通过AJAX加载 -->
                        </div>
                    </div>
                    <div id="protocol-options-modal-container" class="absolute inset-0 pointer-events-none" style="z-index: 20;"></div>
                </div>

                <!-- 插件管理页面 -->
                <div class="page absolute inset-0 flex flex-col hidden" id="plugins-page">
                    <div class="flex-1 overflow-y-auto p-6">
                        <div id="plugins-content">
                            <!-- 内容将通过AJAX加载 -->
                        </div>
                    </div>
                    <div id="plugins-modal-container" class="absolute inset-0 pointer-events-none" style="z-index: 20;"></div>
                </div>
                
            </div>
        </div>
    </div>
    
    <!-- Toast 通知 -->
    <div class="fixed top-4 right-4 z-50 transition-all duration-500 transform translate-x-full opacity-0" id="toast">
        <div class="px-6 py-4 rounded-xl shadow-xl backdrop-blur-md text-white font-semibold flex items-center gap-2">
            <i class="fa fa-info-circle"></i>
            <span id="toast-message"></span>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/config_comments.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/streams.js"></script>
    <script src="js/whip.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/network.js"></script>
    <script src="js/protocol-options.js"></script>
    <script src="js/pull-proxy.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
